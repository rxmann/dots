;==========================================================
;   Polybar config — ported from Waybar
;   Style: black bar, right-side pill, Waybar module parity
;==========================================================

[colors]
background      = #000000
background-pill = #0a0a0a
background-alt  = rgba(255, 255, 255, 0.1)
foreground      = #ffffff
green           = #4ade80
yellow          = #fbbf24
red             = #f87171
blue            = #60a5fa
disabled        = #cccccc

; ── BAR ───────────────────────────────────────────────────────────────────

[bar/main]
width      = 100%
height     = 18pt
radius     = 0
bottom     = false

background = ${colors.background}
foreground = ${colors.foreground}

line-size  = 2pt

border-size  = 0pt
border-color = #00000000

border-bottom-color = rgba(255, 255, 255, 0.1)

padding-left  = 0
padding-right = 0
module-margin = 0

separator            =
separator-foreground = ${colors.disabled}

font-0 = JetBrainsMono Nerd Font:size=9:weight=500;3
font-1 = Font Awesome 6 Free:style=Solid:size=10;3

modules-left   = xworkspaces
modules-center =
modules-right  = systray idle-inhibitor volume wlan battery date powerprofiles powerbtn

cursor-click  = pointer
cursor-scroll = ns-resize
enable-ipc    = true

; ── WORKSPACES ────────────────────────────────────────────────────────────

[module/xworkspaces]
type = internal/xworkspaces

; --- Active Workspace (Selected) ---
label-active = %name%
label-active-background = ${colors.background-alt} 
label-active-foreground = ${colors.green}
label-active-underline = ${colors.green}
label-active-padding = 2

; --- Occupied Workspaces (Have windows but not selected) ---
label-occupied = %name%
label-occupied-foreground = ${colors.foreground}
label-occupied-padding = 2

; --- Urgent Workspaces (Notifications) ---
label-urgent = %name%
label-urgent-background = ${colors.red}
label-urgent-padding = 2

; --- Empty Workspaces ---
label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 2

; ── SYSTRAY ───────────────────────────────────────────────────────────────

[module/systray]
type            = internal/tray
format-margin   = 1pt
tray-spacing    = 8pt
format-padding  = 2
tray-background = ${colors.background-pill}

; ── IDLE INHIBITOR ────────────────────────────────────────────────────────

[module/idle-inhibitor]
type         = custom/script
exec         = ~/projects/dots/polybar/scripts/idle_inhibitor.sh status
interval     = 2
click-left   = ~/projects/dots/polybar/scripts/idle_inhibitor.sh toggle
label            = %output%
label-background = ${colors.background-pill}
label-padding    = 2

; ── VOLUME (icon only, matches waybar format="{icon}") ────────────────────

[module/volume]
type        = custom/script
exec        = ~/projects/dots/polybar/scripts/volume.sh
interval    = 1
click-left  = pavucontrol
click-right = pactl set-sink-mute @DEFAULT_SINK@ toggle
scroll-up   = pactl set-sink-volume @DEFAULT_SINK@ +5%
scroll-down = pactl set-sink-volume @DEFAULT_SINK@ -5%
label            = %output%
label-foreground = ${colors.foreground}
label-background = ${colors.background-pill}
label-padding    = 2

; ── NETWORK ───────────────────────────────────────────────────────────────

[module/wlan]
type           = internal/network
interface-type = wireless
interval       = 5

format-connected    = <label-connected>
format-disconnected = <label-disconnected>

label-connected            = 
label-connected-foreground = ${colors.foreground}
label-connected-background = ${colors.background-pill}
label-connected-padding    = 2

label-disconnected            = 󰖪
label-disconnected-foreground = ${colors.red}
label-disconnected-background = ${colors.background-pill}
label-disconnected-padding    = 2

; ── BATTERY ───────────────────────────────────────────────────────────────

[module/battery]
type     = custom/script
exec     = ~/projects/dots/polybar/scripts/battery.sh
interval = 10
label            = %output%
label-background = ${colors.background-pill}
label-padding    = 2

; ── CLOCK ─────────────────────────────────────────────────────────────────

[module/date]
type     = internal/date
interval = 1

date     = %I:%M %p
date-alt = %Y-%m-%d %I:%M %p

label            = %date%
label-foreground = ${colors.foreground}
label-background = ${colors.background-pill}
label-padding    = 2

; ── POWER PROFILES ────────────────────────────────────────────────────────

[module/powerprofiles]
type = custom/script
exec = ~/projects/dots/polybar/scripts/power_profiles.sh
interval = 5
click-left = ~/projects/dots/polybar/scripts/power_profiles.sh menu

label = %output%
label-background = ${colors.background-pill}
label-padding = 2

format-tooltip = <tooltip>
tooltip = %{exec:powerprofilesctl get}


; ── POWER BUTTON ──────────────────────────────────────────────────────────

[module/powerbtn]
type               = custom/text
content            = 󰐥
content-foreground = ${colors.foreground}
content-background = ${colors.background-pill}
content-padding    = 2
; click-left         = ~/projects/dots/polybar/scripts/power_menu.sh

; ── SETTINGS ──────────────────────────────────────────────────────────────

[settings]
screenchange-reload = true
pseudo-transparency = true

; vim:ft=dosini
