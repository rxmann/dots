#################################
#             Backend           #
#################################
backend = "glx";
vsync = true;
use-damage = true;

#################################
#            Corners            #
#################################
corner-radius = 10;
rounded-corners-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'"
];

#################################
#             Blur              #
#################################
blur-background = true;
blur-method = "dual_kawase";
blur-strength = 6;

blur-background-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'",
  "_GTK_FRAME_EXTENTS@:c"
];

#################################
#           Opacity             #
#################################
active-opacity = 1.0;
inactive-opacity = 0.92;
frame-opacity = 0.7;

opacity-rule = [
    "90:class_g = 'Kitty'",
    "90:class_g = 'URxvt'",
    "100:class_g = 'Firefox'"
];

#################################
#            Shadows            #
#################################
shadow = true;
shadow-radius = 20;
shadow-opacity = 0.6;
shadow-offset-x = -15;
shadow-offset-y = -15;

#################################
#          Animations           #
#################################
# NOTE: These only work on Picom Forks (Pijulius/FTLabs)
animations = true;
animation-stiffness = 300.0;
animation-dampening = 25.0;
animation-clamping = true;
animation-for-open-window = "zoom";
animation-for-menu-window = "slide-down";